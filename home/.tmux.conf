# Sane pane-splitting
bind | split-window -h
bind _ split-window -v
unbind '"'
unbind %

# Easy reload of this file
bind-key r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"

# Advice from neovim healthcheck
set-option -sg escape-time 10
# Use xterm-256color inside tmux so Nerd Font glyphs render correctly
set -g default-terminal "xterm-256color"
# Enable true color for the outer terminal
set-option -sa terminal-overrides ',xterm-256color:Tc'
set -g focus-events on
set -g set-clipboard on

# Tell tmux Nerd Font PUA glyphs are single-width (fixes icon rendering over SSH)
set -as codepoint-widths 'E000-F8FF=1,F0000-FFFFD=1'

# Scoll up and down
# bind -n C-u copy-mode -u

# Status bar
# set-option -g status-right-length 140
# set -g status-right '#(tmux-spotify-info) %H:%M %d-%b-%y'

# More ergonomic prefix key (especially when you have caps lock mapped to control)
unbind C-b
set -g prefix C-s

# Easier window navigation
bind -n C-h select-pane -L
bind -n C-l select-pane -R
bind -n C-k select-pane -U
bind -n C-j select-pane -D

# shift-movement keys will resize panes
bind-key H resize-pane -L 5
bind-key L resize-pane -R 5
bind-key K resize-pane -U 5
bind-key J resize-pane -D 5

# Resize window to full screen
bind -n C-f resize-pane -Z 

# Copy mode more aligned with vim
bind v copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
# 
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'cb-copy'
